<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    button {
      border-radius: 100px;
      border: none;
      background-color: wheat;
      font-size: 30px;
      padding: 10px;
      cursor: pointer;
    }

    .container {
      width: 270px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      row-gap: 10px;
      column-gap: 10px;
    }
  </style>
</head>

<body>
  <input id="showInput" type="text" name="" placeholder="0"><br> <br>
  <div class="container">
    <button onclick="deleteBtn()" id="delete">✕</button>
    <button onclick="clearBtn()" id="clear">C</button>
    <button onclick="percentageBtn()" id="percent">%</button>
    <button onclick="numberBtn(7)" id="seven">7</button>
    <button onclick="numberBtn(8)" id="eight">8</button>
    <button onclick="numberBtn(9)" id="nine">9</button>
    <button onclick="multiplyBtn()">X</button>
    <button onclick="divideBtn()" id="divide">/</button>
    <button onclick="numberBtn(4)" id="four">4</button>
    <button onclick="numberBtn(5)" id="five">5</button>
    <button onclick="numberBtn(6)" id="six">6</button>
    <button onclick="numberBtn(1)">1</button>
    <button onclick="numberBtn(2)">2</button>
    <button onclick="numberBtn(3)">3</button>
    <button onclick="numberBtn('-')">-</button>
    <button onclick="numberBtn(0)">0</button>
    <button onclick="numberBtn('.')">.</button>
    <button onclick="equalsBtn()">=</button>
    <button onclick="plusBtn()">+</button>
  </div>


  <script>

    const numberBtn = (n) => {
      showInput.value += n
    }


    const deleteBtn = () => {
      let deleteInput = document.getElementById('showInput')
      deleteInput.value = deleteInput.value.slice(0, -1)
    }

    const clearBtn = () => {
      let userInput = document.getElementById('showInput');
      userInput.value = ''
    }


    const plusBtn = () => {
      let sumInput = document.getElementById('showInput');
      sumInput.value += "+"
    }

    const multiplyBtn = () =>{
      let multiplyInput = document.getElementById('showInput')
      multiplyInput.value +=  "*"
    }

    const equalsBtn = () => {
      let equalsInput = document.getElementById('showInput');
      equalsInput.value = eval(equalsInput.value);
    }

      const percentageBtn = () => {
      let percentInput = document.getElementById('showInput');
      percentInput.value = percentInput.value / 100;
    }

     const divideBtn = () => {
      let divideInput = document.getElementById('showInput');
      divideInput.value += "/";
    }

    // clearBtn();
  </script>
</body>

</html>
